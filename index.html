<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Yuta's Github Page</title>
  <style>
    :root {
      --bg-color: #f8f9fa;
      --text-color: #212529;
      --accent-color: #007bff;
      --accent-hover: #0056b3;
      --secondary-text: #6c757d;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #121212;
        --text-color: #e0e0e0;
        --accent-color: #37a2ff;
        --accent-hover: #6db1ff;
        --secondary-text: #a0a0a0;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Meiryo", sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      transition: background-color 0.3s, color 0.3s;
    }

    .container {
      padding: 2rem;
      max-width: 800px;
      width: 90%;
    }

    h1 {
      font-size: clamp(2rem, 8vw, 3.5rem);
      margin-bottom: 1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(45deg, var(--accent-color), #00d4ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 1.2rem;
      color: var(--secondary-text);
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .video-container {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
      height: 0;
      overflow: hidden;
      max-width: 640px;
      margin: 0 auto 2.5rem auto;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      background: #000;
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background-color: rgba(0, 123, 255, 0.1);
      color: var(--accent-color);
      font-size: 0.875rem;
      font-weight: 600;
      border-radius: 20px;
      margin-bottom: 1rem;
    }
  </style>
  <!-- Google Tag Manager -->
  <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-5HHRGS2');</script>
  <!-- End Google Tag Manager -->
</head>
<body>
  <div class="container">
    <div class="badge">Welcome</div>
    <h1>Hiya!!</h1>
    <p>This page is a test page for Yuta's GitHub environment.</p>

    <div class="video-container">
      <iframe src="https://www.youtube.com/embed/MSzhdCcs4xU"
              title="YouTube video player"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen></iframe>
    </div>
  </div>

  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-5HHRGS2"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->
</body>
</html>
